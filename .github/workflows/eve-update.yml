name: Eve update check

# The curated-update pipeline: once a week, check whether Eve has a new release, smoke-test
# AIQY against it, and open an issue with the verdict — so upstream churn is absorbed here
# (tested) instead of breaking users. Nothing sensitive is used: only the built-in,
# repo-scoped GITHUB_TOKEN to open an issue.

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for a new Eve release
        id: check
        run: node scripts/check-eve-update.mjs

      - name: Smoke-test the new Eve version
        id: smoke
        if: steps.check.outputs.update == 'true'
        continue-on-error: true
        run: EVE_VERSION=${{ steps.check.outputs.latest }} node scripts/smoke.mjs

      - name: Open an update issue
        if: steps.check.outputs.update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PINNED: ${{ steps.check.outputs.pinned }}
          LATEST: ${{ steps.check.outputs.latest }}
          SMOKE: ${{ steps.smoke.outcome }}
        run: |
          title="Eve ${LATEST} is available (pinned: ${PINNED})"
          if [ "$SMOKE" = "success" ]; then
            verdict="✅ The compatibility smoke test PASSED against eve@${LATEST} — safe to bump."
          else
            verdict="⚠️ The compatibility smoke test FAILED against eve@${LATEST} — needs integration work before bumping."
          fi
          body=$(printf 'A new Eve release is available.\n\n- Pinned: `%s`\n- Latest: `%s`\n\n%s\n\nTo bump: update `EVE_VERSION` in `lib/generator.ts` and the pins in `lib/runtime.ts`, run `node scripts/smoke.mjs` locally, and open a PR.\n\n_Opened automatically by the weekly Eve-update workflow._' "$PINNED" "$LATEST" "$verdict")
          existing=$(gh issue list --state open --search "$title in:title" --json number --jq 'length' 2>/dev/null || echo 0)
          if [ "$existing" = "0" ]; then
            gh issue create --title "$title" --body "$body"
          else
            echo "An open issue for ${LATEST} already exists — skipping."
          fi
