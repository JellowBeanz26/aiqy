name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Proves AIQY's generated-agent shape still compiles against the pinned Eve version —
      # the moat (BYO-model via modelContextWindowTokens), tools, and channels. No model,
      # no API key, no secrets: the smoke agent uses an empty key and a localhost URL.
      - name: Eve compatibility smoke test
        run: node scripts/smoke.mjs
